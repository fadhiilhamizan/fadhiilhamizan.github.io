        tagline: { en: 'A weather dashboard whose sky changes to match the forecast.', id: 'Dasbor cuaca yang langitnya berubah mengikuti ramalan.' },
        role: { en: 'Solo full-stack build', id: 'Proyek full-stack solo' },
        year: '2026',
        stack: ['React', 'Vite', 'Node.js', 'Express', 'Tailwind CSS', 'Leaflet', 'PWA'],

        sections: [
          { h: { en: 'Overview', id: 'Ringkasan' }, body: [
            { p: { en: 'Atmosfer is a full-stack weather app built around three ideas: keep secrets off the client, cache aggressively, and let the interface react to the weather itself. Search any city or use your location for current conditions, a 24-hour hourly strip, and a 7-day outlook — and watch the whole UI re-tint to the real sky and time of day at that place.',
                    id: 'Atmosfer adalah aplikasi cuaca full-stack yang dibangun di atas tiga gagasan: jauhkan rahasia dari klien, cache secara agresif, dan biarkan antarmuka bereaksi terhadap cuaca itu sendiri. Cari kota mana pun atau pakai lokasimu untuk kondisi terkini, strip per jam 24 jam, dan ramalan 7 hari — lalu lihat seluruh UI berubah warna mengikuti langit dan waktu setempat.' } }
          ]},
          { h: { en: 'The challenge', id: 'Tantangan' }, body: [
            { p: { en: 'Calling a weather API straight from the browser is the most common mistake in this kind of project: the API key gets exposed, free-tier quotas burn out fast, and the UI ends up tightly coupled to a messy vendor payload.',
                    id: 'Memanggil API cuaca langsung dari peramban adalah kesalahan paling umum di proyek seperti ini: API key terekspos, kuota tier gratis cepat habis, dan UI jadi terikat erat pada payload vendor yang berantakan.' } }
          ]},
          { h: { en: 'What I built', id: 'Yang saya bangun' }, body: [
            { list: [
              { en: 'A backend proxy (Express) that holds the API key, caches responses with a TTL, and rate-limits per IP.', id: 'Backend proxy (Express) yang menyimpan API key, men-cache respons dengan TTL, dan membatasi laju per IP.' },
              { en: 'An anti-corruption transform layer that normalizes provider data into one clean, predictable contract.', id: 'Lapisan transform anti-korupsi yang menormalkan data penyedia menjadi satu kontrak yang rapi dan dapat diprediksi.' },
              { en: 'A living "sky" theming engine that derives the palette from the condition code and whether it is day or night.', id: 'Mesin tema "langit" hidup yang menurunkan palet dari kode kondisi serta siang atau malam.' },
              { en: 'Dependency-free interactive SVG charts (temperature / precipitation / wind) with hover tooltips.', id: 'Grafik SVG interaktif tanpa dependensi (suhu / presipitasi / angin) dengan tooltip hover.' },
              { en: 'A Leaflet radar map with a RainViewer overlay, code-split so it never bloats the main bundle.', id: 'Peta radar Leaflet dengan overlay RainViewer, dipisah kode agar tak membebani bundel utama.' },
              { en: 'An installable PWA that keeps the last forecast available offline, with full reduced-motion support.', id: 'PWA terinstal yang menyimpan ramalan terakhir secara offline, dengan dukungan reduced-motion penuh.' }
            ]}
          ]},
          { h: { en: 'Tech & decisions', id: 'Teknologi & keputusan' }, body: [
            { p: { en: 'React + Vite for the dashboard UI; Node and Express for the proxy; an in-memory TTL cache behind a small interface so it can be swapped for Redis without touching callers. Open-Meteo is the default provider (no key required), with OpenWeather and an offline demo mode flowing through the same transform — so the UI cannot tell them apart.',
                    id: 'React + Vite untuk UI dasbor; Node dan Express untuk proxy; cache TTL in-memory di balik antarmuka kecil sehingga bisa diganti Redis tanpa menyentuh pemanggil. Open-Meteo jadi penyedia default (tanpa key), dengan OpenWeather dan mode demo offline melewati transform yang sama — sehingga UI tak bisa membedakannya.' } },

            { p: { en: 'You play someone with a careless habit of throwing trash into the sea. One day a strong current sweeps you to the bottom of the ocean, trapped in an underwater dimension. To return to the surface you explore, clean up the very trash you once dumped, and rescue the creatures it harmed — discovering how beautiful, and how fragile, the marine ecosystem really is.',
                    id: 'Kamu memerankan seseorang yang punya kebiasaan buruk membuang sampah ke laut. Suatu hari arus kuat menyapumu ke dasar lautan, terjebak di sebuah dimensi bawah laut. Untuk kembali ke permukaan, kamu menjelajah, membersihkan sampah yang dulu kamu buang, dan menyelamatkan hewan yang terdampak — sambil menemukan betapa indah, sekaligus rapuhnya, ekosistem laut.' } }
          ]},
          { h: { en: 'Why it matters', id: 'Mengapa ini penting' }, body: [
            { p: { en: 'Indonesia is the world’s largest archipelago — roughly 81,000 km of coastline, home to about 8,500 fish species and 950 coral-reef biota. Yet it is also the world’s second-largest plastic polluter, generating 12.5 million tonnes of plastic waste in 2022. Naufragus turns those statistics into something a child can feel and act on.',
                    id: 'Indonesia adalah negara kepulauan terbesar di dunia — sekitar 81.000 km garis pantai, rumah bagi kurang lebih 8.500 spesies ikan dan 950 biota terumbu karang. Namun ia juga penyumbang sampah plastik terbesar kedua di dunia, dengan 12,5 juta ton sampah plastik pada 2022. Naufragus mengubah statistik itu menjadi sesuatu yang bisa dirasakan dan ditindaklanjuti oleh anak-anak.' } }
          ]},
          { h: { en: 'Gameplay & mechanics', id: 'Gameplay & mekanik' }, body: [
            { list: [
              { en: 'Clean up trash scattered through the world (press E on PC, or an on-screen button on mobile).', id: 'Bersihkan sampah yang tersebar di dunia game (tekan E di PC, atau tombol di layar pada ponsel).' },

              { en: 'Simple parkour obstacles and environmental puzzles gate your progress.', id: 'Rintangan parkour sederhana dan teka-teki lingkungan menghalangi kemajuanmu.' },

      var d = CS[id];
      var root = document.getElementById('cs');
      var back = '<a class="breadcrumb" href="index.html#projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' + esc(t(L.back, lang)) + '</a>';
      if (!d) { root.innerHTML = back + '<p style="color:var(--text-2);margin-top:1rem;">' + esc(t(L.nf, lang)) + '</p>'; return; }

      document.title = d.title + ' — Fadhiil Akmal Hamizan';

      var secHtml = d.sections.map(function (s) {
        var inner = s.body.map(function (b) {
          if (b.p) return '<p>' + esc(t(b.p, lang)) + '</p>';
          if (b.list) return '<ul>' + b.list.map(function (li) { return '<li>' + esc(t(li, lang)) + '</li>'; }).join('') + '</ul>';
          if (b.callout) return '<div class="cs-callout glass"><span class="q">&ldquo;</span>' + esc(t(b.callout, lang)) + '&rdquo;</div>';
          return '';
        }).join('');
        return '<h2>' + esc(t(s.h, lang)) + '</h2>' + inner;
      }).join('');

      var rows = metaRow(t(L.role, lang), t(d.role, lang)) + metaRow(t(L.year, lang), d.year);
      if (d.team) rows += metaRow(t(L.team, lang), t(d.team, lang));
      if (d.award) rows += metaRow(t(L.award, lang), t(d.award, lang));
      rows += metaRow(t(L.stack, lang), d.stack.join(' · '));

      var linksHtml = (d.links || []).map(function (l) {
        return '<a class="btn ' + (l.primary ? 'btn-primary' : 'btn-ghost') + '" href="' + l.href + '" target="_blank" rel="noopener">' + esc(t(l.label, lang)) + '</a>';
      }).join('');

      var extras = '';
      if (d.theme === 'sky') extras = '<div class="ws-sun"></div><div class="ws-cloud c1"></div><div class="ws-cloud c2"></div>';
      if (d.theme === 'ocean') extras = '<div class="ocean-ray" style="left:20%"></div><div class="ocean-ray" style="left:62%;animation-delay:-3s"></div><span class="sea-life" style="top:26%;left:16%">🐠</span><span class="sea-life" style="top:48%;left:74%;animation-delay:-2s">🪼</span>';

      var idx = ORDER.indexOf(id);
      var nextId = ORDER[(idx + 1) % ORDER.length];
      var nd = CS[nextId];

      root.innerHTML = back
        + '<div class="cs-hero"><div class="cs-hero-bg ' + d.theme + '"></div>' + extras
        + '<div class="cs-hero-inner"><div class="cs-kicker">' + esc(t(d.kicker, lang)) + '</div><h1 class="cs-title">' + esc(d.title) + '</h1><div class="cs-tagline">' + esc(t(d.tagline, lang)) + '</div></div></div>'
        + '<div class="cs-layout"><div class="cs-body">' + secHtml + '</div>'
        + '<aside class="cs-side"><div class="glass-card panel"><div class="panel-title">' + esc(t(L.details, lang)) + '</div>' + rows + '</div>'
        + (linksHtml ? ('<div class="glass-card panel" style="gap:0.7rem;display:flex;flex-direction:column;">' + linksHtml + '</div>') : '') + '</aside></div>'
        + '<a class="glass-card cs-next" href="project.html#' + nextId + '"><div><div class="label">' + esc(t(L.next, lang)) + '</div><div class="name">' + esc(nd.title) + ' →</div></div><span class="btn btn-ghost">' + esc(t(L.open, lang)) + '</span></a>';
    }

    render(getLang());
    document.addEventListener('langchange', function (e) { render(e.detail.lang); });
    window.addEventListener('hashchange', function () { render(getLang()); window.scrollTo(0, 0); });
  })();
  </script>
  <script src="assets/site.js" defer></script>
</body>
</html>
